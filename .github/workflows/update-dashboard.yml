name: Update SEO Dashboard

on:
  schedule:
    - cron: '0 5 * * *'   # Every day at 6:00 AM UTC (10:00 AM UAE time)
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Write credentials file
        run: echo '${{ secrets.GSC_CREDENTIALS }}' > credentials.json

      - name: Run SEO dashboard script
        run: python fetch_seo_data.py

      - name: Remove credentials file
        run: rm credentials.json

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seo_dashboard.html
          git diff --cached --quiet || git commit -m "Update SEO dashboard - $(date +'%Y-%m-%d')"
          git push
